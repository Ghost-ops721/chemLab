name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Public placeholders so Next build can resolve Firebase client modules
          NEXT_PUBLIC_FIREBASE_API_KEY: build-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: chem-lab-build
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: chem-lab-build.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:0"

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Playwright smoke
        run: npx playwright test
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: build-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: chem-lab-build
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: chem-lab-build.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:0"
